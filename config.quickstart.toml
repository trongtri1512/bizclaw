# command = "npx"
# args = ["-y", "@modelcontextprotocol/server-memory"]

# ── Context7: docs thư viện mới nhất ──
# [[mcp_servers]]
# name = "context7"
# command = "npx"
# args = ["-y", "@context7/mcp"]

# ═══════════════════════════════════════════════════════════
# BRAIN ENGINE — Chạy AI offline (không cần API key)
# ═══════════════════════════════════════════════════════════
[brain]
enabled = true
model_path = "~/.bizclaw/models/tinyllama-1.1b-chat-v1.0.Q4_K_M.gguf"
threads = 4
max_tokens = 512
context_length = 2048
auto_download = true
